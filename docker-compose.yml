version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       vaultdb
      POSTGRES_USER:     vault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_dev_only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./agent/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vault -d vaultdb']
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./agent/.env
    environment:
      DATABASE_URL: postgresql://vault:${POSTGRES_PASSWORD:-change_me_dev_only}@postgres:5432/vaultdb
    volumes:
      - ./agent:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./frontend/.env.local
    environment:
      DATABASE_URL: postgresql://vault:${POSTGRES_PASSWORD:-change_me_dev_only}@postgres:5432/vaultdb
    ports:
      - '3000:3000'

volumes:
  postgres_data:
